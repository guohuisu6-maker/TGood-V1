<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智T盈 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        :root {
            --primary-color: #0070C0;
            --primary-light: #D9E1F2;
            --primary-dark: #003366;
            --success-color: #00B050;
            --danger-color: #C00000;
            --bg-color: #F8F9FA;
            --card-bg: #FFFFFF;
            --text-primary: #212529;
            --text-secondary: #6C757D;
            --border-color: #DEE2E6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            padding: 32px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-header .logo-icon {
            width: 64px;
            height: 64px;
            background-color: var(--primary-dark);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: white;
            font-weight: 700;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 4px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 112, 192, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .form-group .error {
            font-size: 12px;
            color: var(--danger-color);
            margin-top: 6px;
            display: none;
        }

        .form-group.has-error input {
            border-color: var(--danger-color);
        }

        .form-group.has-error .error {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #005A9E;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-primary:disabled {
            background-color: #94C0E4;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .login-footer p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 14px;
            color: white;
            z-index: 1000;
            animation: fadeInSlide 0.3s ease;
            display: none;
        }

        @keyframes fadeInSlide {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.error {
            background-color: var(--danger-color);
        }

        .toast.success {
            background-color: var(--success-color);
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .remember-me label {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">智T</div>
                <h1>智T盈 - 智能做T盈利助手</h1>
                <p>请登录您的账户</p>
            </div>

            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
                <div class="error" id="usernameError">用户名不能为空</div>
            </div>

            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
                <div class="error" id="passwordError">密码不能为空</div>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">记住我</label>
            </div>

            <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
                登 录
            </button>

            <div class="login-footer">
                <p>© 2026 智T盈 - 智能做T盈利助手</p>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const toast = document.getElementById('toast');

        function showToast(message, type = 'error') {
            toast.textContent = message;
            toast.className = `toast ${type}`;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function validateForm() {
            let isValid = true;
            
            if (!usernameInput.value.trim()) {
                document.getElementById('usernameError').textContent = '用户名不能为空';
                usernameInput.parentElement.classList.add('has-error');
                isValid = false;
            } else {
                usernameInput.parentElement.classList.remove('has-error');
            }
            
            if (!passwordInput.value.trim()) {
                document.getElementById('passwordError').textContent = '密码不能为空';
                passwordInput.parentElement.classList.add('has-error');
                isValid = false;
            } else {
                passwordInput.parentElement.classList.remove('has-error');
            }
            
            return isValid;
        }

        async function handleLogin() {
            if (!validateForm()) return;

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span>登录中...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: usernameInput.value.trim(),
                        password: passwordInput.value.trim()
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showToast('登录成功，正在跳转...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    document.getElementById('passwordError').textContent = data.error || '登录失败';
                    passwordInput.parentElement.classList.add('has-error');
                    showToast(data.error || '用户名或密码错误');
                }
            } catch (error) {
                showToast('网络错误，请稍后重试');
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登 录';
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });

        usernameInput.addEventListener('input', function() {
            usernameInput.parentElement.classList.remove('has-error');
        });

        passwordInput.addEventListener('input', function() {
            passwordInput.parentElement.classList.remove('has-error');
        });
    </script>
</body>
</html>
